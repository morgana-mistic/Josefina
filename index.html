<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bienvenida, Josefina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Nunito',sans-serif;
background:#efe8df;
}

body{

background-image:

linear-gradient(rgba(250,247,243,.45),rgba(250,247,243,.45)),
url("portada.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

/*-------------------------
CAPA SUAVE
--------------------------*/

.overlay{

position:absolute;
inset:0;

background:

linear-gradient(
180deg,
rgba(255,255,255,.25),
rgba(255,255,255,.15),
rgba(255,255,255,.35)
);

backdrop-filter:blur(2px);

}

/*-------------------------
PARTICULAS
--------------------------*/

.particle{

position:absolute;

width:6px;
height:6px;

border-radius:50%;

background:rgba(255,255,255,.8);

animation:float 14s linear infinite;

opacity:.6;

}

.star{

position:absolute;

color:#fff;

font-size:12px;

animation:twinkle 5s ease-in-out infinite;

opacity:.7;

}

@keyframes float{

0%{

transform:translateY(100vh) translateX(0);
opacity:0;

}

20%{

opacity:.7;

}

80%{

opacity:.7;

}

100%{

transform:translateY(-120vh) translateX(40px);
opacity:0;

}

}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(.8);
}

50%{
opacity:1;
transform:scale(1.2);
}

100%{
opacity:.2;
transform:scale(.8);
}

}

/*-------------------------
TARJETA
--------------------------*/

.card{

position:relative;

z-index:5;

width:min(92%,460px);

background:rgba(255,250,246,.72);

backdrop-filter:blur(14px);

border-radius:34px;

padding:42px 30px;

text-align:center;

box-shadow:

0 20px 45px rgba(0,0,0,.12),

0 0 0 1px rgba(255,255,255,.45);

animation:appear 1.4s ease;

}

@keyframes appear{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:none;

}

}

.icon{

font-size:52px;
margin-bottom:14px;

animation:swing 5s ease-in-out infinite;

}

@keyframes swing{

0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}

}

h1{

font-family:'Cormorant Garamond',serif;

font-size:48px;

color:#7c665d;

font-weight:600;

margin-bottom:12px;

}

.subtitle{

font-size:18px;

line-height:1.7;

color:#6f6a63;

margin-bottom:36px;

}

/*-------------------------
BOTONES
--------------------------*/

.buttons{

display:flex;
flex-direction:column;
gap:16px;

}

.btn{

display:flex;
justify-content:center;
align-items:center;

text-decoration:none;

padding:16px;

border-radius:18px;

background:#ffffffd8;

color:#6e625a;

font-weight:700;

font-size:17px;

transition:.35s;

box-shadow:

0 10px 24px rgba(0,0,0,.08);

}

.btn:hover{

transform:translateY(-4px);

background:#fff;

box-shadow:

0 16px 30px rgba(0,0,0,.12);

}

.footer{

margin-top:32px;

font-size:13px;

color:#8b837d;

font-style:italic;

}

/*-------------------------
RESPONSIVE
--------------------------*/

@media(max-width:600px){

.card{

padding:34px 24px;

}

h1{

font-size:39px;

}

.subtitle{

font-size:16px;

}

.btn{

font-size:16px;

padding:15px;

}

}

/*-------------------------
ESTRELLAS
--------------------------*/

.s1{top:8%;left:10%;animation-delay:0s;}
.s2{top:16%;right:12%;animation-delay:2s;}
.s3{top:70%;left:12%;animation-delay:4s;}
.s4{top:78%;right:10%;animation-delay:1s;}
.s5{top:28%;left:85%;animation-delay:3s;}
.s6{top:55%;left:6%;animation-delay:5s;}

.p1{left:8%;animation-delay:0s;}
.p2{left:22%;animation-delay:4s;}
.p3{left:35%;animation-delay:7s;}
.p4{left:50%;animation-delay:3s;}
.p5{left:67%;animation-delay:6s;}
.p6{left:83%;animation-delay:9s;}
.p7{left:93%;animation-delay:12s;}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>
<div class="particle p7"></div>

<div class="star s1">✦</div>
<div class="star s2">✦</div>
<div class="star s3">✦</div>
<div class="star s4">✦</div>
<div class="star s5">✦</div>
<div class="star s6">✦</div>

<div class="card">

<div class="icon">🧸</div>

<h1>Bienvenida,<br>Josefina</h1>

<p class="subtitle">

Cada historia comienza con un pequeño milagro.

</p>

<div class="buttons">

<a class="btn" href="album.html">

📖 Mi primer álbum

</a>

<button class="btn" id="musicBtn">

🎵 Reproducir música

</button>

<a class="btn" href="mensajes.html">

💌 Mensajes para Josefina

</a>

<a class="btn" href="muro.html">

💖 Leer mensajes

</a>

</div>

<div class="footer">

Con mucho amor para recordar tus primeros días.

</div>

</div>

<audio id="music">

<source src="Te esperaba.mp3" type="audio/mpeg">

</audio>

<script>

const audio=document.getElementById("music");

const btn=document.getElementById("musicBtn");

let playing=false;

btn.addEventListener("click",()=>{

if(!playing){

audio.play();

btn.innerHTML="⏸️ Pausar música";

playing=true;

}else{

audio.pause();

btn.innerHTML="🎵 Reproducir música";

playing=false;

}

});

audio.addEventListener("ended",()=>{

playing=false;

btn.innerHTML="🎵 Reproducir música";

});

</script>

</body>
</html>
