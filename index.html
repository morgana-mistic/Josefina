<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Josefina</title>

<style>

html,body{

margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;

}

#contenedor{

position:relative;
width:100vw;
height:100vh;
overflow:hidden;

}

#portada{

position:absolute;
left:0;
top:0;
width:100%;
height:100%;
object-fit:contain;
user-select:none;

}

/* zonas clickeables */

#galeria{

position:absolute;
cursor:pointer;
z-index:20;

}

#musica{

position:absolute;
cursor:pointer;
z-index:20;

}

/* botón detener */

#detener{

display:none;

position:absolute;

top:20px;
right:20px;

padding:12px 20px;

border:none;

border-radius:10px;

background:#d46d8d;

color:white;

font-size:18px;

cursor:pointer;

z-index:100;

}

/* firma */

#firma{

    position:absolute;

    left:50%;
    bottom:18px;

    transform:translateX(-50%);

    z-index:200;

    font-family:Arial, Helvetica, sans-serif;

    font-size:16px;

    font-weight:bold;

    white-space:nowrap;

}

#firma a{

    color:white;

    text-decoration:none;

    text-shadow:
        0 0 3px black,
        0 0 6px black,
        0 0 10px black;

    transition:.25s;

}

#firma a:hover{

    color:#ffd6e6;

}

</style>

</head>

<body>

<div id="contenedor">

<img id="portada" src="portada.png">

<a id="galeria" href="galeria.html"></a>

<div id="musica"></div>

<button id="detener">

Detener música

</button>

<div id="firma">
    <a href="https://wa.me/5493854118422" target="_blank">
        Diseño digital Morgana Tecno
    </a>
</div>

</div>

<audio id="audio">

<source src="Te esperaba.mp3" type="audio/mpeg">

</audio>

<script>

const imagen=document.getElementById("portada");

const galeria=document.getElementById("galeria");

const musica=document.getElementById("musica");

const audio=document.getElementById("audio");

const detener=document.getElementById("detener");

function ubicarBotones(){

const rect=imagen.getBoundingClientRect();

/*
Estas medidas corresponden a la imagen de 1024x1536.
Si en el futuro cambias la portada sólo habrá que
modificar estos números.
*/

const escalaX=rect.width/1024;
const escalaY=rect.height/1536;

const offsetX=rect.left;
const offsetY=rect.top;

/************* GALERIA *************/

galeria.style.left=(offsetX+330*escalaX)+"px";
galeria.style.top=(offsetY+745*escalaY)+"px";
galeria.style.width=(365*escalaX)+"px";
galeria.style.height=(95*escalaY)+"px";

/************** MUSICA *************/

musica.style.left=(offsetX+345*escalaX)+"px";
musica.style.top=(offsetY+865*escalaY)+"px";
musica.style.width=(335*escalaX)+"px";
musica.style.height=(90*escalaY)+"px";

}

window.addEventListener("resize",ubicarBotones);

imagen.onload=ubicarBotones;

musica.onclick=function(){

audio.pause();

audio.currentTime=0;

audio.play();

detener.style.display="block";

}

detener.onclick=function(){

audio.pause();

audio.currentTime=0;

detener.style.display="none";

}

</script>

</body>

</html>
