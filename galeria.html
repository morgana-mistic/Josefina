<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi mundo chiquito - Josefina</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap');

body {
    margin: 0;
    padding: 20px;
    background: #fff7f2;
    font-family: 'Poppins', sans-serif;
    color: #8b5e5e;
    text-align: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 55px;
    font-weight: normal;
    color: #c98b9b;
    margin: 15px 0 30px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 30px;
    max-width: 1000px;
    margin: auto;
}

.foto {
    background: #ffffff;
    padding: 12px 12px 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(180,130,130,0.25);
    transition: transform .3s ease;
}

.foto:hover {
    transform: translateY(-5px);
}

.foto img {
    width: 100%;
    height: 270px;
    object-fit: cover;
    border-radius: 10px;
}

.texto {
    margin-top: 18px;
    font-size: 16px;
    color: #9d6b75;
    font-style: italic;
}


.volver {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 30px;
    background: #dca7b6;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 5px 12px rgba(0,0,0,.15);
}

.volver:hover {
    background: #c98b9b;
}


</style>

</head>

<body>

<h1>Mi mundo chiquito</h1>


<div class="galeria">

<div class="foto">
<img src="foto1.jpeg">
<div class="texto">En camino</div>
</div>

<div class="foto">
<img src="foto2.jpeg">
<div class="texto">Mi primera foto</div>
</div>

<div class="foto">
<img src="foto3.jpeg">
<div class="texto">Empezando a soñar conmigo</div>
</div>

<div class="foto">
<img src="foto4.jpeg">
<div class="texto">Creciendo en la barriga de mami</div>
</div>

<div class="foto">
<img src="foto5.jpeg">
<div class="texto">Esperándome con amor</div>
</div>

<div class="foto">
<img src="foto6.jpeg">
<div class="texto">Creciendo</div>
</div>

<div class="foto">
<img src="foto7.jpeg">
<div class="texto">Ya tenía muchos besitos esperándome</div>
</div>

<div class="foto">
<img src="foto8.jpeg">
<div class="texto">Mis papitos</div>
</div>

<div class="foto">
<img src="foto9.jpeg">
<div class="texto">El día que comenzó mi nombre</div>
</div>

<div class="foto">
<img src="foto10.jpeg">
<div class="texto">Mi tío</div>
</div>

</div>


<a class="volver" href="index.html">Volver al inicio</a>


</body>
</html>
